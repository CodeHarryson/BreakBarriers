name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: App — typecheck, lint, content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run validate:content
      - run: npm run typecheck
      - run: npm run lint

  server:
    name: Server — typecheck + prisma generate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
