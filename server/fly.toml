# Fly.io config — deploy with:
#   fly launch --no-deploy   (first time; claims the app name)
#   fly secrets set DATABASE_URL="postgres://..."
#   fly deploy
app = "breakbarriers-api"
primary_region = "iad"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
